name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  verify:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "APP_VERSION=$VERSION" >> version.env
          echo "BUILD_NUMBER=$GITHUB_RUN_NUMBER" >> version.env
          cat version.env

      - name: Verify build
        run: swift build -c release